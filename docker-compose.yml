version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: medala_db
    environment:
      POSTGRES_DB: medala_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: medala_api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: medala_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: dev-secret-key-change-in-production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data: